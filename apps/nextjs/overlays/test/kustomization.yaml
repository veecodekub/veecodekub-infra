resources:
  - ../../base
  - namespace.yaml

namespace: nextjs-test

images:
  - name: ghcr.io/veecodekub/nextjs-cicd
    newTag: 0.0.1

patches:
  - target:
      kind: Ingress
      name: nextjs
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: nextjs-test.veecodekub.dev
      - op: add
        path: /metadata/annotations
        value:
          cert-manager.io/cluster-issuer: letsencrypt-prod
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - nextjs-test.veecodekub.dev
            secretName: nextjs-test-tls
  - target:
      kind: ConfigMap
      name: nextjs-config
    patch: |-
      - op: replace
        path: /data/API_URL
        value: https://nestjs-test.veecodekub.dev
