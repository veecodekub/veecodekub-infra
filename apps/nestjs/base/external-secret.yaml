apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nestjs-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: nestjs-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: nestjs/database-url
    - secretKey: DIRECT_URL
      remoteRef:
        key: nestjs/direct-url
