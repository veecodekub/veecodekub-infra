resources:
  - ../../base
  - namespace.yaml
  - pdb.yaml
  - hpa.yaml
  - network-policy.yaml

namespace: nestjs-prod

images:
  - name: ghcr.io/veecodekub/nestjs-cicd
    newTag: main-1c61f31
    digest: sha256:6a02b28547a1a91f6dc60c07e7567fdc11caab13c2f4ffcef567075d2c489d7e

patches:
  - target:
      kind: ExternalSecret
      name: nestjs-secret
    patch: |-
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: nestjs/prod
      - op: replace
        path: /spec/data/1/remoteRef/key
        value: nestjs/prod
  - target:
      kind: Ingress
      name: nestjs
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: nestjs-prod.veecodekub.dev
      - op: add
        path: /metadata/annotations
        value:
          cert-manager.io/cluster-issuer: letsencrypt-prod
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - nestjs-prod.veecodekub.dev
            secretName: nestjs-prod-tls
  - target:
      kind: Deployment
      name: nestjs
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
