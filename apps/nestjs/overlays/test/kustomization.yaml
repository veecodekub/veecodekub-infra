resources:
  - ../../base
  - namespace.yaml

namespace: nestjs-test

images:
  - name: ghcr.io/veecodekub/nestjs-cicd
    newTag: test-04fc3f5

patches:
  - target:
      kind: Ingress
      name: nestjs
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: nestjs-test.veecodekub.dev
      - op: add
        path: /metadata/annotations
        value:
          cert-manager.io/cluster-issuer: letsencrypt-prod
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - nestjs-test.veecodekub.dev
            secretName: nestjs-test-tls
