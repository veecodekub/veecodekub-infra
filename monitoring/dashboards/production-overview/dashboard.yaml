apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-production-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  production-overview.json: |-
    {
      "uid": "production-overview",
      "title": "Production Overview",
      "tags": ["production", "nextjs", "nestjs"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Active Prod Alerts",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "expr": "count(ALERTS{alertstate=\"firing\", environment=\"prod\"})",
              "legendFormat": "firing",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            }
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Uptime Targets Up",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum(probe_success{job=\"production-uptime\"})",
              "legendFormat": "up",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 3
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "NextJS Available Replicas",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"nextjs-prod\", deployment=\"nextjs\"}",
              "legendFormat": "nextjs",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 2
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "NestJS Available Replicas",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"nestjs-prod\", deployment=\"nestjs\"}",
              "legendFormat": "nestjs",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 2
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            }
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Endpoint Uptime",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "targets": [
            {
              "expr": "probe_success{job=\"production-uptime\"}",
              "legendFormat": "{{ instance }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 1,
              "unit": "short"
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Endpoint Latency",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "targets": [
            {
              "expr": "probe_duration_seconds{job=\"production-uptime\"}",
              "legendFormat": "{{ instance }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Container Restarts",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 12
          },
          "targets": [
            {
              "expr": "sum by (namespace, pod, container) (increase(kube_pod_container_status_restarts_total{namespace=~\"nextjs-prod|nestjs-prod\"}[10m]))",
              "legendFormat": "{{ namespace }}/{{ pod }}/{{ container }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "CPU Usage vs Limit",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 12
          },
          "targets": [
            {
              "expr": "100 * sum by (namespace, pod, container) (rate(container_cpu_usage_seconds_total{namespace=~\"nextjs-prod|nestjs-prod\", container!=\"\", image!=\"\"}[5m])) / sum by (namespace, pod, container) (kube_pod_container_resource_limits{namespace=~\"nextjs-prod|nestjs-prod\", resource=\"cpu\"})",
              "legendFormat": "{{ namespace }}/{{ pod }}/{{ container }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Memory Usage vs Limit",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 12
          },
          "targets": [
            {
              "expr": "100 * container_memory_working_set_bytes{namespace=~\"nextjs-prod|nestjs-prod\", container!=\"\", image!=\"\"} / kube_pod_container_resource_limits{namespace=~\"nextjs-prod|nestjs-prod\", resource=\"memory\"}",
              "legendFormat": "{{ namespace }}/{{ pod }}/{{ container }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          }
        },
        {
          "id": 10,
          "type": "table",
          "title": "HPA Current Replicas",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 0,
            "y": 20
          },
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=~\"nextjs-prod|nestjs-prod\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "{{ namespace }}/{{ horizontalpodautoscaler }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 11,
          "type": "table",
          "title": "Firing Production Alerts",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 12,
            "y": 20
          },
          "targets": [
            {
              "expr": "ALERTS{alertstate=\"firing\", environment=\"prod\"}",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ]
        }
      ]
    }
