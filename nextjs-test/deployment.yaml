apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextjs
  template:
    metadata:
      labels:
        app: nextjs
    spec:
      containers:
        - name: nextjs
          image: ghcr.io/veecodekub/nextjs-cicd:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: nextjs-config
